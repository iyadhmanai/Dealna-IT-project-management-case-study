spring.application.name=dealna-api

server.port=8080

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

spring.datasource.url=${DEALNA_DATABASE_URL:jdbc:postgresql://localhost:5432/dealna}
spring.datasource.username=${DEALNA_DATABASE_USERNAME:dealna}
spring.datasource.password=${DEALNA_DATABASE_PASSWORD:dealna}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
